<div class="row mt-3">
  <div class="col-md-6">
    <label class="form-label">Fondo</label>
    <ng-select
      [closeOnSelect]="false"
      [hideSelected]="true"
      placeholder="Seleccione Fondo SI/NO"
      notFoundText="No se encontraron coincidencias"
      [(ngModel)]="fondo"
    >
      <ng-option [value]="1">SI</ng-option>
      <ng-option [value]="0">NO</ng-option>
    </ng-select>
  </div>
  <div class="col-md-6">
    <label class="form-label">ID IRS</label>
    <input type="text" class="form-control" [(ngModel)]="idIrs" />
  </div>
</div>
<div class="row mt-2">
  <div class="col">
    <button
      type="button"
      class="btn btn-primary w-100"
      (click)="guardarFondo()"
    >
      Guardar Fondo
    </button>
  </div>
</div>

<div class="row mt-3">
  <div class="col">
    <hr />
  </div>
</div>

<div class="row mt-3">
  <div class="col-md-6">
    <button class="btn btn-success w-100" (click)="sincronizar()">
      Sincronizar
    </button>
  </div>
</div>
